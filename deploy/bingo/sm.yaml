apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bs
  namespace: bingo
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: bs
  endpoints:
  - port: http
    path: /metrics
  namespaceSelector:
    matchNames:
    - bingo
---
