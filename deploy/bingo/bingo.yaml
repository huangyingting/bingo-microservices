apiVersion: v1
kind: Service
metadata:
  name: gowitness
  labels:
    app: gowitness
spec:
  ports:
  - name: http
    port: 7171
    targetPort: 7171
  selector:
    app: gowitness
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gowitness
  labels:
    app: gowitness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gowitness
  template:
    metadata:
      labels:
        app: gowitness
    spec:
      containers:
      - name: gowitness
        image: huangyingting/gowitness:latest
        command: ["gowitness"]
        args: ["server", "--address", "0.0.0.0:7171", "-X", "800", "-Y", "600"]
        ports:
        - name: http
          containerPort: 7171
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    kubernetes.io/ingress.class: nginx
  labels:
    app: gowitness
  name: gowitness
spec:
  rules:
  - host: gowitness.aliases.biz
    http:
      paths:
      - backend:
          service:
            name: gowitness
            port:
              number: 7171
        path: /
        pathType: ImplementationSpecific
  tls:
  - hosts:
    - gowitness.aliases.biz
    secretName: gowitness-tls
---
apiVersion: v1
kind: Service
metadata:
  name: be
  labels:
    app: be
spec:
  ports:
  - name: http
    port: 8002
    targetPort: 8002
  selector:
    app: be
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: be
  labels:
    app: be
spec:
  replicas: 1
  selector:
    matchLabels:
      app: be
  template:
    metadata:
      labels:
        app: be
    spec:
      containers:
      - name: be
        image: ghcr.io/huangyingting/be:latest
        imagePullPolicy: Always
        env:
        - name: BE_JAEGER_ADDR
          value: http://jaeger-collector.jaeger.svc.cluster.local:14268/api/traces
        ports:
        - name: http
          containerPort: 8002
---
